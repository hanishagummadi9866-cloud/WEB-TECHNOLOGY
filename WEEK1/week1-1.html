<!DOCTYPE html>
<html>
<head>
    <title>Online Mobile Store</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f2f2f2;
        }

        header{
            background:#007BFF;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            background:#333;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:18px;
        }

        nav a:hover{
            color:yellow;
        }

        h2{
            text-align:center;
            margin-top:20px;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            width:250px;
            margin:20px;
            padding:15px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
            text-align:center;
        }

        .card img{
            width:180px;
            height:180px;
        }

        .price{
            color:green;
            font-size:22px;
            font-weight:bold;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#218838;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>

</head>

<body>

<header>
    <h1>ONLINE MOBILE STORE</h1>
    <p>Latest Smartphones at Best Prices</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Mobiles</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
</nav>

<h2>Available Mobiles</h2>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/180" alt="Samsung">
<h3>Samsung Galaxy S24</h3>
<p>8GB RAM | 256GB Storage</p>
<p class="price">₹74,999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/180" alt="iPhone">
<h3>iPhone 16</h3>
<p>128GB Storage</p>
<p class="price">₹89,999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/180" alt="OnePlus">
<h3>OnePlus 13</h3>
<p>12GB RAM | 256GB Storage</p>
<p class="price">₹59,999</p>
<button>Buy Now</button>
</div>

</div>

<footer>
    © 2026 Online Mobile Store | All Rights Reserved
</footer>

</body>
</html>
